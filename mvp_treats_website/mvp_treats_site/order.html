<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order | MVP Treats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <img src="assets/logo-badge.png" alt="MVP Treats logo" />
        <span>MVP Treats</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="benefits.html">Benefits</a>
        <a href="order.html">Order</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container two-col">
      <div class="panel">
        <span class="kicker">Order MVP Treats</span>
        <h1>Click the button to place an order, or scan the QR code</h1>
        <div class="cta-row">
          <a class="btn btn-primary" href="https://docs.google.com/forms/d/e/1FAIpQLSfr8bW3N2gBcVhGtgLbPxdnBTQg7mwOv5UgdNwYddxNBRlnoQ/viewform?usp=header" target="_blank" rel="noopener noreferrer">Order Form Link</a>

        </div>
      </div>
      <div class="panel">
        <div class="order-link-placeholder" style="text-align: center;">
          <a href="https://docs.google.com/forms/d/e/1FAIpQLSfr8bW3N2gBcVhGtgLbPxdnBTQg7mwOv5UgdNwYddxNBRlnoQ/viewform?usp=header" target="_blank" rel="noopener noreferrer">
            <img src="assets/qr-code-new.png" alt="MVP Treats Order QR Code" style="max-width: 220px; height: auto;" />
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div><strong>MVP Treats</strong></div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
